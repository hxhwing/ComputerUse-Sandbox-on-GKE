# 授权 sandbox namespace 的 default SA 管理 Pod
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-pod-manager
  namespace: sandbox
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-pod-manager
  namespace: sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sandbox-pod-manager
subjects:
  - kind: ServiceAccount
    name: default
    namespace: sandbox
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: browser-use-agent
  namespace: sandbox
  labels:
    app: browser-use-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: browser-use-agent
  template:
    metadata:
      labels:
        app: browser-use-agent
    spec:
      # standard runc（无 runtimeClassName）→ 支持 kubectl port-forward
      # 使用 GKE node 默认 service account（已有 K8s API 权限）
      containers:
        - name: agent
          # ⚠️ 替换为你的 Artifact Registry 镜像路径
          image: <YOUR_REGION>-docker.pkg.dev/<YOUR_PROJECT_ID>/<YOUR_REPO>/browser-use-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_MODE
              value: "true"
            - name: SANDBOX_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
